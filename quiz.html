<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #f5f5f7;
    }

    .small-hero {
      height: 35vh;
      background: linear-gradient(to bottom right, #fff7c2, #ffe680);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .quiz-box {
      max-width: 800px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.15);
    }

    .progress {
      width: 100%;
      height: 18px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #ffd400;
      transition: width 0.4s ease;
    }

    .question {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .answers label {
      display: block;
      background: #f5f5f7;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.3s;
    }

    .answers label:hover {
      border-color: #ffd400;
    }

    .btn-next {
      padding: 14px 36px;
      border-radius: 999px;
      background: #ffd400;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-next:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.15);
    }

    #result {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
